# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build Rust

on:
  workflow_call:

permissions:
  contents: read

env:
  CARGO_FEATURES: --all-features
  CARGO_TERM_COLOR: always
  RUSTFLAGS: --deny=warnings --cfg tokio_unstable

jobs:
  cargo-build:
    name: Cargo build
    runs-on: ubuntu-latest
    steps:
      - &checkout
        name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          show-progress: false

      - &set_up_mold
        name: Set up mold
        uses: rui314/setup-mold@725a8794d15fc7563f59595bd9556495c0564878 # v1

      - &set_up_toolchain
        name: Set up toolchain
        shell: bash
        run: |
          rm ${HOME}/.cargo/bin/cargo-fmt
          rm ${HOME}/.cargo/bin/rust-analyzer
          rm ${HOME}/.cargo/bin/rustfmt

          rustup self update
          rustup update
          rustup show active-toolchain || rustup toolchain install
          rustup show

          cargo --version

      - name: Build
        shell: bash
        run: |
          cargo build ${{ env.CARGO_FEATURES }} --all-targets --workspace --timings

      - name: Upload build timings
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: cargo-timings-linux
          path: target/cargo-timings/

  cargo-build-windows:
    name: Cargo build Windows
    runs-on: windows-2025
    steps:
      - &disable_autocrlf
        name: Disable autocrlf
        shell: pwsh
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - *checkout

      - *set_up_mold

      - &set_up_toolchain_windows
        name: Set up toolchain
        shell: pwsh
        run: |
          Remove-Item -ErrorAction SilentlyContinue ${HOME}/.cargo/bin/cargo-fmt.exe
          Remove-Item -ErrorAction SilentlyContinue ${HOME}/.cargo/bin/rust-analyzer.exe
          Remove-Item -ErrorAction SilentlyContinue ${HOME}/.cargo/bin/rustfmt.exe

          rustup self update
          rustup update
          rustup show active-toolchain || rustup toolchain install
          rustup show

          cargo --version

      - name: Build
        shell: pwsh
        run: |
          cargo build --all-features --all-targets --locked --workspace --verbose --timings

      - name: Upload build timings
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: cargo-timings-windows
          path: target/cargo-timings/

  cargo-test-and-report:
    name: Cargo test (and report)
    runs-on: ubuntu-latest
    steps:
      - *checkout

      - *set_up_mold

      - *set_up_toolchain

      - name: Install llvm-tools
        shell: bash
        run: |
          rustup component add llvm-tools

          # restore symlinks
          rustup update

      - name: Install nextest, custom test runner, with native support for junit and grcov
        uses: taiki-e/install-action@d858f8113943481093e02986a7586a4819a3bfd6 # v2.71.2
        with:
          tool: cargo-nextest, grcov

      - name: Build with instrumentation support
        shell: bash
        env:
          RUSTFLAGS: "${{ env.RUSTFLAGS }} --allow=warnings -Cinstrument-coverage"
          # build-* ones are not parsed by grcov
          LLVM_PROFILE_FILE: "profiling/build-%p-%m.profraw"
        run: |
          cargo build ${{ env.CARGO_FEATURES }} --all-targets --workspace

      - name: Run nextest
        shell: bash
        id: tests
        env:
          RUSTFLAGS: "${{ env.RUSTFLAGS }} --allow=warnings -Cinstrument-coverage"
          LLVM_PROFILE_FILE: "profiling/profile-%p-%m.profraw"
        run: |
          cargo nextest run --profile ci --no-fail-fast ${{ env.CARGO_FEATURES }} --all-targets --workspace
        continue-on-error: true

      - name: Run grcov
        shell: bash
        run: |
          grcov $(find . -name "profile-*.profraw" -print) \
            --binary-path ./target/debug/ \
            --branch \
            --excl-br-line "^\s*((debug_)?assert(_eq|_ne)?!)" \
            --excl-br-start "mod tests \{" \
            --excl-line "(#\\[derive\\()|(^\s*.await[;,]?$)" \
            --excl-start "mod tests \{" \
            --ignore-not-existing \
            --keep-only "crates/**" \
            --llvm \
            --output-path ./reports/ \
            --output-type lcov \
            --source-dir .

      - name: Fail if tests failed
        shell: bash
        if: |
          steps.tests.outcome != 'success'
        run: |
          # the test reporter we use (or any for that matter)
          # all show a report. But we cannot depend on that report because
          # we don't know which subsection it belongs in GitHub
          # so we explicitly fail this one
          # which will fail All Done
          exit 1

  cargo-test-and-report-windows:
    name: Cargo test (and report) Windows
    runs-on: windows-2025
    steps:
      - *disable_autocrlf

      - *checkout

      - *set_up_mold

      - *set_up_toolchain_windows

      - name: Install llvm-tools
        shell: pwsh
        run: |
          rustup component add llvm-tools

          # restore symlinks
          rustup update

      - name: Install nextest, custom test runner, with native support for junit and grcov
        uses: taiki-e/install-action@d858f8113943481093e02986a7586a4819a3bfd6 # v2.71.2
        with:
          tool: cargo-nextest, grcov

      - name: Build with instrumentation support
        shell: pwsh
        env:
          RUSTFLAGS: "${{ env.RUSTFLAGS }} --allow=warnings -Cinstrument-coverage"
          # build-* ones are not parsed by grcov
          LLVM_PROFILE_FILE: "profiling/build-%p-%m.profraw"
        run: |
          cargo build --all-features --all-targets --locked --workspace --verbose

      - name: Run nextest
        shell: pwsh
        id: tests
        env:
          RUSTFLAGS: "${{ env.RUSTFLAGS }} --allow=warnings -Cinstrument-coverage"
          LLVM_PROFILE_FILE: "profiling/profile-%p-%m.profraw"
        run: |
          cargo nextest run --profile ci --no-fail-fast --all-targets --all-features --workspace
        continue-on-error: true

      - name: Run grcov
        shell: pwsh
        run: |
          grcov $(Get-ChildItem -Recurse -Filter '*.profraw' -Path . | % { $_.FullName }) `
            --binary-path ./target/debug/ `
            --branch `
            --ignore-not-existing `
            --keep-only "crates/**/src/**" `
            --llvm `
            --output-path ./reports/lcov.info `
            --output-type lcov `
            --source-dir .

      - name: Fail if tests failed
        shell: pwsh
        if: |
          steps.tests.outcome != 'success'
        run: |
          # the test reporter we use (or any for that matter)
          # all show a report. But we cannot depend on that report because
          # we don't know which subsection it belongs in GitHub
          # so we explicitly fail this one
          # which will fail All Done
          exit 1

  cargo-clippy-and-report:
    name: Cargo clippy (and report)
    runs-on: ubuntu-latest
    steps:
      - *checkout

      - *set_up_mold

      - *set_up_toolchain

      - name: Run Clippy for GitHub Actions report
        uses: actions-rs-plus/clippy-check@23b52efac3da0e2b197a9ad2e7be0f515502aaaf # v2.5.0
        with:
          args: ${{ env.CARGO_FEATURES }} --all-targets --workspace --timings

      - name: Upload build timings
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: cargo-timings-clippy-linux
          path: target/cargo-timings/

  cargo-clippy-and-report-windows:
    name: Cargo clippy (and report) Windows
    runs-on: windows-2025
    steps:
      - *disable_autocrlf

      - *checkout

      - *set_up_mold

      - *set_up_toolchain_windows

      - name: Run Clippy for GitHub Actions report
        uses: actions-rs-plus/clippy-check@23b52efac3da0e2b197a9ad2e7be0f515502aaaf # v2.5.0
        with:
          args: --all-features --all-targets --locked --workspace --verbose --timings

      - name: Upload build timings
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: cargo-timings-clippy-windows
          path: target/cargo-timings/

  all-done:
    name: Rust All done
    # this is the job that should be marked as required on GitHub. It's the only one that'll reliably trigger
    # when any upstream fails: success
    # when all upstream skips: pass
    # when all upstream success: success
    # combination of upstream skip and success: success
    runs-on: ubuntu-slim
    needs:
      - cargo-build
      - cargo-build-windows
      - cargo-clippy-and-report
      - cargo-clippy-and-report-windows
      - cargo-test-and-report
      - cargo-test-and-report-windows
    if: |
      !cancelled()
    steps:
      - name: Fail!
        shell: bash
        if: |
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')
        run: |
          echo "One / more upstream failed or was cancelled. Failing job..."

          exit 1

      - name: Success!
        shell: bash
        run: |
          echo "Great success!"
