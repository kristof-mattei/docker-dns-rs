# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  # each new commit to a PR runs this workflow
  # so we need to avoid a long running older one from overwriting the "pr-<number>-latest"
  group: "${{ github.workflow }} @ ${{ github.ref_name }}"
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_VARIANTS: |-
    arm64
    amd64
    amd64/v2
    amd64/v3
  REGISTRY: ghcr.io

jobs:
  architectures:
    name: Build matrix
    runs-on: ubuntu-slim
    if: ${{ !startsWith(github.head_ref, 'release/') }}
    outputs:
      architectures: ${{ steps.matrix.outputs.architectures }}
    steps:
      - name: Build matrix
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        id: matrix
        with:
          script: |
            const architectures = process.env.IMAGE_VARIANTS.trim().split("\n").map((a) => a.trim());

            const json = JSON.stringify(architectures);

            core.setOutput("architectures", json);

  rust-build:
    name: Build Rust code
    if: ${{ !startsWith(github.head_ref, 'release/') }}
    uses: ./.github/workflows/rust.yml
    secrets: inherit
    permissions:
      checks: write
      contents: read
      id-token: write
      pull-requests: write

  repo-has-container:
    name: Repo has container?
    runs-on: ubuntu-slim
    if: ${{ !startsWith(github.head_ref, 'release/') }}
    outputs:
      has_container: ${{ steps.determine.outputs.has_container }}
    steps:
      - name: Repo has docker container?
        shell: bash
        id: determine
        run: |
          has_container="${{ vars.HAS_CONTAINER }}"
          echo "has_container=${has_container:-false}" >> "${GITHUB_OUTPUT}"

  changes:
    name: Detect changes
    runs-on: ubuntu-slim
    if: ${{ !startsWith(github.head_ref, 'release/') }}
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - &checkout
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          show-progress: false

      - name: Check if we actually made changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: .github/file-filters.yml

  all-done:
    name: All done
    # this is the job that should be marked as required on GitHub. It's the only one that'll reliably trigger
    # when any upstream fails: success
    # when all upstream skips: pass
    # when all upstream success: success
    # combination of upstream skip and success: success
    runs-on: ubuntu-slim
    needs:
      - changes
      - rust-build
    if: |
      !cancelled()
    steps:
      - name: Fail!
        shell: bash
        if: |
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')
        run: |
          echo "One / more upstream failed or was cancelled. Failing job..."

          exit 1

      - name: Success!
        shell: bash
        run: |
          echo "Great success!"
